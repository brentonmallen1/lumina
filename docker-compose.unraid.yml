# Whisper GUI for Unraid
# Uses pre-built image from registry — no local build required.
#
# Setup:
#   1. Copy this file to your Unraid server
#   2. Create /mnt/user/appdata/whisper-gui/
#   3. Edit the DOCKER_REGISTRY value below to point to your registry
#   4. Run: docker compose -f docker-compose.unraid.yml up -d
#
# GPU Support:
#   Requires Nvidia-Driver plugin from Community Apps.
#   GPU is enabled by default — set ENABLE_GPU=false to disable.

services:
  whisper-gui:
    image: ${DOCKER_REGISTRY:-ghcr.io/CHANGEME/whisper-gui}:${DOCKER_TAG:-latest}
    container_name: whisper-gui
    ports:
      - "${APP_PORT:-8880}:8000"
    environment:
      # ── Engine ──────────────────────────────────────────────────────
      # Options: faster-whisper, whisper, canary, qwen-audio
      # Note: canary/qwen-audio require GPU and the :canary image tag
      TRANSCRIPTION_ENGINE: ${TRANSCRIPTION_ENGINE:-faster-whisper}

      # ── Model ───────────────────────────────────────────────────────
      # For faster-whisper/whisper: tiny, base, small, medium, large-v3, large-v3-turbo
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-large-v3-turbo}

      # For canary engine (requires :canary tag)
      CANARY_MODEL: ${CANARY_MODEL:-nvidia/canary-qwen-2.5b}

      # For qwen-audio engine
      QWEN_MODEL: ${QWEN_MODEL:-Qwen/Qwen2.5-Audio-3B-Instruct}

      # ── Performance ─────────────────────────────────────────────────
      # Quantization: int8 (fastest), int8_float16, float16, float32
      COMPUTE_TYPE: ${COMPUTE_TYPE:-int8_float16}

      # Language: en, es, fr, de, etc. or blank for auto-detect
      LANGUAGE: ${LANGUAGE:-en}

      # ── Auth (optional) ─────────────────────────────────────────────
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}

      # ── Internal paths (don't change) ───────────────────────────────
      HF_HOME: /models/hf
      WHISPER_DOWNLOAD_ROOT: /models/whisper
    volumes:
      # Models persist here (can be several GB)
      - /mnt/user/appdata/whisper-gui/models:/models
      # Temporary audio file cache
      - /mnt/user/appdata/whisper-gui/cache:/cache/audio
    restart: unless-stopped
    # ── GPU Support ─────────────────────────────────────────────────────
    # Comment out this entire deploy block to run CPU-only
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
